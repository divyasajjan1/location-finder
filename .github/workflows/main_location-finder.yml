name: Build and deploy Python app to Azure Web App - location-finder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip tools
        run: python -m pip install --upgrade pip setuptools wheel

      # Optional local dependency check
      - name: Install dependencies (local check)
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # Build a clean deploy folder with the correct structure
      - name: Prepare deployment folder
        run: |
          mkdir deploy
          cp backend/manage.py deploy/
          cp -r backend/backend deploy/backend
          cp -r backend/api deploy/api
          cp backend/*.py deploy/
          cp requirements.txt deploy/


      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Debug workspace
        run: ls -R .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9956D8C8A3CB4DEF8065670272BDCAA8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_555C3C5154324CA49C499A57FE95F1F9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_659AF4E8C80047F29EB5D035D7BEBBEC }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'location-finder'
          slot-name: 'Production'
          package: .


